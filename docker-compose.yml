version: "3.9"

services:

  db:
    image: postgres:16-alpine
    restart: unless-stopped

    environment:
      POSTGRES_DB: newsagent
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}

    command: >
      postgres
      -c shared_buffers=256MB
      -c max_connections=200

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

    security_opt:
      - no-new-privileges:true

    networks:
      - backend

  redis:
    image: redis:7-alpine
    restart: unless-stopped

    command: redis-server --appendonly yes

    volumes:
      - redis_data:/data

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

    security_opt:
      - no-new-privileges:true

    networks:
      - backend

  bot:
    build:
      context: ./bot
      dockerfile: Dockerfile

    restart: unless-stopped

    env_file:
      - .env

    environment:
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: postgresql+asyncpg://postgres:${DB_PASSWORD}@db:5432/newsagent

    depends_on:
      db:
        condition: service_healthy

      redis:
        condition: service_healthy

    ports:
      - "8080:8080"

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

    security_opt:
      - no-new-privileges:true

    networks:
      - backend

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend

    restart: unless-stopped

    environment:
      VITE_BOT_USERNAME: ${BOT_USERNAME}

    depends_on:
      - bot

    ports:
      - "3001:80"

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

    security_opt:
      - no-new-privileges:true

    networks:
      - frontend
      - backend

  nginx:
    image: nginx:1.27-alpine

    restart: unless-stopped

    depends_on:
      - bot
      - frontend

    ports:
      - "80:80"
      - "443:443"

    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/proxy.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_conf:/etc/letsencrypt:ro

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

    security_opt:
      - no-new-privileges:true

    networks:
      - backend
      - frontend

volumes:
  postgres_data:
  redis_data:
  certbot_www:
  certbot_conf:

networks:
  backend:
  frontend:

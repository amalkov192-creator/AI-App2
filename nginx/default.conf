server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Required for Telegram Mini App iframe
    add_header X-Frame-Options "ALLOW-FROM https://web.telegram.org";
    add_header Content-Security-Policy "frame-ancestors 'self' https://web.telegram.org https://t.me";

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location /health {
        return 200 "ok";
        add_header Content-Type text/plain;
    }
}
